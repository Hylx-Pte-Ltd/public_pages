<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<dc-import name="PhoneShell" kind="sub" title="{{ title }}" action="{{ action }}" show-back="{{ showBack }}" on-back="{{ onBack }}" on-action="{{ onAction }}" bg="{{ bg }}" gap="{{ gap }}" hint-size="290px,600px">{{ children }}</dc-import>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: {&quot;width&quot;: 290, &quot;height&quot;: 600},
  &quot;title&quot;: {&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},
  &quot;action&quot;: {&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},
  &quot;showBack&quot;: {&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},
  &quot;bg&quot;: {&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#ffffff&quot;,&quot;options&quot;:[&quot;#ffffff&quot;,&quot;#f5f5f5&quot;],&quot;tsType&quot;:&quot;string&quot;},
  &quot;gap&quot;: {&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;11px&quot;,&quot;tsType&quot;:&quot;string&quot;}
}"></script>
</body>
</html>
