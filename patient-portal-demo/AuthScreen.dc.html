<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<dc-import name="PhoneShell" kind="auth" show-back="{{ showBack }}" on-back="{{ onBack }}" bg="{{ bg }}" gap="{{ gap }}" hint-size="290px,600px">{{ children }}</dc-import>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: {&quot;width&quot;: 290, &quot;height&quot;: 600},
  &quot;showBack&quot;: {&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},
  &quot;bg&quot;: {&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#ffffff&quot;,&quot;options&quot;:[&quot;#ffffff&quot;,&quot;#1f2a44&quot;],&quot;tsType&quot;:&quot;string&quot;},
  &quot;gap&quot;: {&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;0px&quot;,&quot;tsType&quot;:&quot;string&quot;}
}"></script>
</body>
</html>
