<html>
<head>

</head>
<body>
<x-dc>
<dc-import name="PhoneShell" kind="menu" active-tab="{{ activeTab }}" bg="{{ bg }}" gap="{{ gap }}" hint-size="290px,600px">{{ children }}</dc-import>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: {&quot;width&quot;: 290, &quot;height&quot;: 600},
  &quot;activeTab&quot;: {&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Home&quot;,&quot;options&quot;:[&quot;Home&quot;,&quot;Tests&quot;,&quot;Reports&quot;,&quot;Profile&quot;,&quot;Body&quot;],&quot;tsType&quot;:&quot;string&quot;},
  &quot;bg&quot;: {&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#ffffff&quot;,&quot;options&quot;:[&quot;#ffffff&quot;,&quot;#f5f5f5&quot;],&quot;tsType&quot;:&quot;string&quot;},
  &quot;gap&quot;: {&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;11px&quot;,&quot;tsType&quot;:&quot;string&quot;}
}"></script>
</body>
</html>
